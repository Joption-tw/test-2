<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>歐大時間價值追蹤儀 - V4.0.1</title>
    
    <!-- 載入必要函式庫 (CDN) -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.0/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { 
            background-color: #020617; 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            overflow-x: hidden; 
            color: #f8fafc; 
            -webkit-tap-highlight-color: transparent;
        }
        
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 20px; }
        
        input[type=range] { -webkit-appearance: none; background: transparent; width: 100%; cursor: pointer; }
        
        .y-slider { 
            transform: rotate(-90deg); 
            width: 180px; 
            height: 6px;  
            background: #1e293b; 
            border-radius: 10px; 
            position: absolute; 
        }
        @media (min-width: 768px) {
            .y-slider { width: 220px; }
        }

        .x-slider-compact { 
            height: 8px; 
            background: #1e293b; 
            border-radius: 10px; 
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; 
            height: 28px; 
            width: 28px; 
            border-radius: 50%; 
            background: #fff; 
            border: 4px solid currentColor; 
            box-shadow: 0 0 15px rgba(0,0,0,0.6); 
            transition: transform 0.1s ease;
        }
        input[type=range]:active::-webkit-slider-thumb { transform: scale(1.2); }
        
        .recharts-legend-item-text { font-size: 18px !important; font-weight: 900 !important; color: #fff !important; }
        
        .sync-btn-glow {
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
        }
        .sync-btn-glow:hover {
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.4);
            background-color: rgba(56, 189, 248, 0.15);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { 
            ResponsiveContainer, AreaChart, Area, XAxis, YAxis, 
            CartesianGrid, Tooltip, ReferenceDot, Legend 
        } = window.Recharts;
        const { useState, useEffect, useMemo } = React;

        const APP_VERSION = "V4.0.1-LABEL-FIX";
        const CSV_URL = "https://docs.google.com/spreadsheets/d/1AsY4_MJipaMp_cNLpyeXTpFGnG0FD4vWJu-SDRdvtME/export?format=csv&gid=710415505";
        const COLORS = {
            wed: "#38bdf8",
            fri: "#4ade80",
            max: "#fb7185",
            amber: "#fbbf24",
            labelRed: "#ff4d4d",
            labelYellow: "#facc15"
        };

        const CustomizedLabel = (props) => {
            const { x, y, value, index, maxIndex, minIndex, latestIndex, dy, labelColor } = props;
            const isMax = index === maxIndex;
            const isMin = index === minIndex;
            const isLatest = index === latestIndex;
            
            if (!isLatest && !isMax && !isMin) return null;

            let labelPrefix = "";
            let textAnchor = "middle";
            let offsetX = 0;

            if (isMax) {
                labelPrefix = "最高: ";
            } else if (isMin) {
                labelPrefix = "最低: ";
            } else if (isLatest) {
                labelPrefix = "即時: ";
                // 關鍵修正：即時點位靠右對齊並向左移，避免超出格子
                textAnchor = "end";
                offsetX = -10; 
            }
            
            return (
                <text 
                    x={x} 
                    y={y} 
                    dx={offsetX}
                    dy={dy || -15} 
                    fill={labelColor} 
                    fontSize={18} 
                    fontWeight="900" 
                    textAnchor={textAnchor}
                    style={{ filter: 'drop-shadow(0px 2px 5px rgba(0,0,0,1))' }}
                    className="pointer-events-none"
                >
                    {labelPrefix + value}
                </text>
            );
        };

        const App = () => {
            const [rawData, setRawData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedTradingDate, setSelectedTradingDate] = useState('');
            const [yRange, setYRange] = useState({ min: 0, max: 20000 });
            const [yLimit, setYLimit] = useState({ min: 0, max: 40000 });
            const [xRange, setXRange] = useState([0, 100]);

            const parseCSVLine = (text) => {
                const result = [];
                let cur = "";
                let inQuote = false;
                for (let i = 0; i < text.length; i++) {
                    const char = text[i];
                    if (char === '"') {
                        if (inQuote && text[i + 1] === '"') { cur += '"'; i++; }
                        else { inQuote = !inQuote; }
                    } else if (char === ',' && !inQuote) {
                        result.push(cur.trim());
                        cur = "";
                    } else { cur += char; }
                }
                result.push(cur.trim());
                return result;
            };

            const calculateTradingDate = (dateStr, timeStr) => {
                if (!dateStr || !timeStr) return dateStr;
                const hh = parseInt(timeStr.split(':')[0]);
                if (hh >= 15) {
                    const d = new Date(dateStr);
                    if (isNaN(d.getTime())) return dateStr;
                    d.setDate(d.getDate() + 1);
                    const m = String(d.getMonth() + 1).padStart(2, '0');
                    const day = String(d.getDate()).padStart(2, '0');
                    return d.getFullYear() + "-" + m + "-" + day;
                }
                return dateStr;
            };

            const fetchData = async () => {
                setLoading(true);
                try {
                    const response = await fetch(CSV_URL + "&t=" + Date.now());
                    const csvText = await response.text();
                    const lines = csvText.split(/\r?\n/).filter(l => l.trim().length > 0);
                    const parsed = lines.slice(1, 2851).map(function(line, index) {
                        const row = parseCSVLine(line);
                        if (row.length < 5) return null;
                        const cleanVal = (v) => (!v || v.trim() === "") ? null : parseFloat(v.replace(/,/g, '').replace(/[^0-9.-]/g, ''));
                        const extract = (idx) => {
                            const raw = row[idx] || "";
                            const full = raw.replace(/"/g, '').trim();
                            const dayMatch = full.match(/[一二三四五六日]/);
                            const timeMatch = full.match(/\d{1,2}:\d{2}/);
                            const dateMatch = full.match(/\d{4}-\d{2}-\d{2}/);
                            return { full, dayChar: dayMatch ? dayMatch[0] : "", time: timeMatch ? timeMatch[0] : "", date: dateMatch ? dateMatch[0] : "" };
                        };
                        const infoWed = extract(1);
                        const infoFri = extract(3);
                        return {
                            id: index,
                            time: infoWed.time || infoFri.time,
                            dayChar: infoWed.dayChar || infoFri.dayChar,
                            tradingDate: calculateTradingDate(infoWed.date || infoFri.date, infoWed.time || infoFri.time),
                            wedValue: cleanVal(row[2]),
                            friValue: cleanVal(row[4])
                        };
                    }).filter(Boolean);
                    setRawData(parsed);
                } catch (err) { console.error(err); }
                finally { setLoading(false); }
            };

            useEffect(() => { fetchData(); }, []);
            useEffect(() => { if (!loading && typeof lucide !== 'undefined') lucide.createIcons(); }, [loading, selectedTradingDate]);

            const activeDataset = useMemo(function() {
                const baseData = rawData.filter(d => d.wedValue !== null || d.friValue !== null);
                const startIndex = baseData.findIndex(d => {
                    if (d.dayChar === '三' || d.dayChar === '五') {
                        return parseInt(d.time.split(':')[0]) >= 15;
                    }
                    return false;
                });
                return startIndex === -1 ? [] : baseData.slice(startIndex);
            }, [rawData]);

            const availableTradingDates = useMemo(() => {
                const dates = activeDataset.map(d => d.tradingDate).filter(Boolean);
                return Array.from(new Set(dates)).sort();
            }, [activeDataset]);

            useEffect(() => {
                if (availableTradingDates.length > 0) {
                    setSelectedTradingDate(availableTradingDates[availableTradingDates.length - 1]);
                }
            }, [availableTradingDates]);

            const baseFilteredData = useMemo(() => activeDataset.filter(d => d.tradingDate === selectedTradingDate), [activeDataset, selectedTradingDate]);

            const displayData = useMemo(() => {
                if (baseFilteredData.length === 0) return [];
                const startIdx = Math.floor((xRange[0] / 100) * (baseFilteredData.length - 1));
                const endIdx = Math.ceil((xRange[1] / 100) * (baseFilteredData.length - 1));
                return baseFilteredData.slice(startIdx, endIdx + 1);
            }, [baseFilteredData, xRange]);

            const rowLabels = useMemo(() => {
                if (baseFilteredData.length === 0) return { start: 'C2', end: 'C2843' };
                const start = Math.floor((xRange[0] / 100) * (baseFilteredData.length - 1));
                const end = Math.ceil((xRange[1] / 100) * (baseFilteredData.length - 1));
                return { start: 'C' + (baseFilteredData[start].id + 2), end: 'C' + (baseFilteredData[end].id + 2) };
            }, [baseFilteredData, xRange]);

            const stats = useMemo(() => {
                if (displayData.length === 0) return null;
                const getStats = (key) => {
                    const validEntries = displayData.filter(d => d[key] !== null && d[key] > 0);
                    if (validEntries.length === 0) return null;
                    const vals = validEntries.map(d => d[key]);
                    const maxVal = Math.min.apply(null, vals.map(v => -v)) * -1;
                    const minVal = Math.max.apply(null, vals.map(v => -v)) * -1;
                    const lastValidObj = validEntries[validEntries.length - 1];
                    return { 
                        min: minVal, max: maxVal, latest: lastValidObj[key],
                        maxIdx: displayData.findIndex(d => d[key] === maxVal),
                        minIndex: displayData.findIndex(d => d[key] === minVal),
                        latestIndex: displayData.lastIndexOf(lastValidObj)
                    };
                };
                return { wed: getStats('wedValue'), fri: getStats('friValue') };
            }, [displayData]);

            useEffect(() => {
                if (stats && (stats.wed || stats.fri)) {
                    const allMax = Math.max((stats.wed && stats.wed.max) || 0, (stats.fri && stats.fri.max) || 0);
                    const allMin = Math.min((stats.wed && stats.wed.min) || 99999, (stats.fri && stats.fri.min) || 99999);
                    const actualMin = allMin === 99999 ? 0 : allMin;
                    const margin = (allMax - actualMin) * 0.15 || 200;
                    setYRange({ min: Math.max(0, Math.floor(actualMin - margin)), max: Math.ceil(allMax + margin) });
                }
            }, [baseFilteredData.length, stats]);

            return (
                <div className="min-h-screen text-slate-100 p-3 md:p-6 font-sans">
                    <div className="max-w-[1600px] mx-auto space-y-4 md:space-y-6">
                        
                        {/* Header Section */}
                        <header className="flex flex-col md:flex-row md:items-end justify-between gap-6 px-2 md:px-4 py-4 md:py-6 border-b border-slate-800/50">
                            <div className="text-center md:text-left">
                                <div className="flex items-center justify-center md:justify-start gap-3 mb-2 text-sky-400 font-bold text-[14px]">
                                    <i data-lucide="layout-template" className="w-5 h-5 opacity-70"></i>
                                    <span className="uppercase tracking-widest italic opacity-50">Label Optimization V4.0.1</span>
                                </div>
                                <h1 className="text-3xl lg:text-5xl font-black tracking-tighter bg-gradient-to-br from-white via-white to-slate-500 bg-clip-text text-transparent">
                                    歐大時間價值追蹤儀
                                </h1>
                            </div>
                            
                            {/* 功能按鈕組 */}
                            <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-3">
                                <button 
                                    onClick={fetchData}
                                    className="sync-btn-glow flex items-center justify-center gap-3 bg-sky-600/10 border border-sky-500/50 px-6 py-3 rounded-2xl group transition-all active:scale-[0.96]"
                                >
                                    <i data-lucide="refresh-cw" className="w-5 h-5 text-sky-400 group-hover:rotate-180 transition-transform duration-700"></i>
                                    <span className="text-[18px] font-black text-sky-400 tracking-tighter">同步數據</span>
                                </button>
                                
                                <div className="flex items-center justify-center text-slate-300 text-[18px] font-mono bg-slate-900 border border-slate-700 px-6 py-3 rounded-2xl shadow-lg ring-1 ring-white/5">
                                    目前盤勢: <span className="text-sky-400 font-black ml-2 tracking-tighter">{selectedTradingDate || '--'}</span>
                                </div>
                            </div>
                        </header>

                        <div className="space-y-6">
                            <div className="bg-slate-900 border border-slate-800 rounded-[1.5rem] md:rounded-[2.5rem] p-3 md:p-8 shadow-2xl relative">
                                <div className="flex gap-2 md:gap-4">
                                    
                                    {/* Y 軸拉桿 */}
                                    <div className="flex flex-col items-center justify-between py-6 md:py-8 w-12 md:w-16 bg-slate-950/80 rounded-xl md:rounded-2xl border border-slate-700 shadow-inner relative overflow-hidden">
                                        <i data-lucide="maximize-2" className="text-rose-400 w-4 h-4 md:w-5 md:h-5"></i>
                                        <div className="h-40 md:h-48 relative flex items-center justify-center w-full">
                                            <input type="range" min={yRange.min + 10} max={yLimit.max} step="10" value={yRange.max} onChange={e=>setYRange({min: yRange.min, max: parseInt(e.target.value)})} className="y-slider" />
                                        </div>
                                        <span className="text-[12px] md:text-[14px] font-mono text-rose-400 font-bold mt-20 md:mt-24">{yRange.max}</span>
                                        <span className="text-[12px] md:text-[14px] font-mono text-amber-400 font-bold mb-20 md:mb-24">{yRange.min}</span>
                                        <div className="h-40 md:h-48 relative flex items-center justify-center w-full">
                                            <input type="range" min={0} max={yRange.max - 10} step="10" value={yRange.min} onChange={e=>setYRange({min: parseInt(e.target.value), max: yRange.max})} className="y-slider" />
                                        </div>
                                        <i data-lucide="minimize-2" className="text-amber-400 w-4 h-4 md:w-5 md:h-5"></i>
                                    </div>

                                    {/* 中央圖表區域 */}
                                    <div className="flex-1 h-[450px] md:h-[650px] relative overflow-hidden">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <AreaChart data={displayData} margin={{ top: 40, right: 10, left: 0, bottom: 0 }}>
                                                <defs>
                                                    <linearGradient id="colorWed" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor={COLORS.wed} stopOpacity={0.4}/><stop offset="95%" stopColor={COLORS.wed} stopOpacity={0}/></linearGradient>
                                                    <linearGradient id="colorFri" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor={COLORS.fri} stopOpacity={0.4}/><stop offset="95%" stopColor={COLORS.fri} stopOpacity={0}/></linearGradient>
                                                </defs>
                                                <CartesianGrid strokeDasharray="3 3" stroke="#334155" vertical={false} opacity={0.3} />
                                                <XAxis dataKey="time" stroke="#64748b" fontSize={16} tickLine={false} axisLine={false} tick={{ fill: '#cbd5e1' }} interval={Math.floor(displayData.length / 5) || 1} height={40} />
                                                <YAxis stroke="#64748b" fontSize={16} tickLine={false} axisLine={false} domain={[yRange.min, yRange.max]} allowDataOverflow={true} tickFormatter={v=>v.toLocaleString()} width={70} tick={{ fill: '#cbd5e1' }} hide={window.innerWidth < 640} />
                                                <Tooltip content={props => {
                                                    const { active, payload } = props;
                                                    if (active && payload && payload.length) return (
                                                        <div className="bg-slate-900 border border-slate-600 p-4 rounded-xl shadow-2xl ring-1 ring-white/10 backdrop-blur-xl min-w-[180px]">
                                                            <p className="text-slate-400 text-[18px] mb-2 font-mono flex items-center gap-2 font-bold"><i data-lucide="clock" className="w-4 h-4"></i> {payload[0].payload.time}</p>
                                                            <div className="space-y-1 text-[18px] font-mono font-black">
                                                                <p className="text-sky-400 flex justify-between"><span>週三:</span> <span>{payload[0].payload.wedValue?.toLocaleString() || '--'}</span></p>
                                                                <p className="text-emerald-400 flex justify-between"><span>週五:</span> <span>{payload[0].payload.friValue?.toLocaleString() || '--'}</span></p>
                                                            </div>
                                                        </div>
                                                    );
                                                    return null;
                                                }} />
                                                <Legend verticalAlign="top" height={40} />
                                                <Area 
                                                    name="週三選" type="monotone" dataKey="wedValue" stroke={COLORS.wed} strokeWidth={3} fill="url(#colorWed)" 
                                                    dot={false} connectNulls={false} activeDot={{ r: 6, fill: COLORS.wed, stroke: '#fff', strokeWidth: 2 }} 
                                                    label={<CustomizedLabel dy={-15} maxIndex={stats?.wed?.maxIdx} minIndex={stats?.wed?.minIndex} latestIndex={stats?.wed?.latestIndex} labelColor={COLORS.labelYellow} />} 
                                                />
                                                <Area 
                                                    name="週五選" type="monotone" dataKey="friValue" stroke={COLORS.fri} strokeWidth={3} fill="url(#colorFri)" 
                                                    dot={false} connectNulls={false} activeDot={{ r: 6, fill: COLORS.fri, stroke: '#fff', strokeWidth: 2 }} 
                                                    label={<CustomizedLabel dy={25} maxIndex={stats?.fri?.maxIdx} minIndex={stats?.fri?.minIndex} latestIndex={stats?.fri?.latestIndex} labelColor={COLORS.labelRed} />} 
                                                />
                                            </AreaChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>

                                {/* X 軸縮放 */}
                                <div className="mt-6 px-3 md:px-6 py-4 bg-slate-950/80 rounded-xl md:rounded-2xl border border-slate-700 shadow-inner">
                                    <div className="flex flex-col sm:flex-row sm:items-center justify-between mb-4 gap-2">
                                        <div className="flex items-center gap-3">
                                            <i data-lucide="move-horizontal" className="text-sky-400 w-4 h-4"></i>
                                            <span className="text-[18px] font-black text-slate-400 uppercase tracking-widest">資料行號區間定位</span>
                                        </div>
                                        <div className="text-[16px] font-mono font-bold text-sky-400 px-3 py-1 bg-sky-400/10 rounded-lg border border-sky-400/20 text-center sm:text-left">
                                            {rowLabels.start} ~ {rowLabels.end}
                                        </div>
                                    </div>
                                    <div className="space-y-8 md:space-y-6 px-1">
                                        <div className="flex items-center gap-4">
                                            <span className="hidden sm:inline text-[14px] font-mono font-bold text-blue-400 w-24 text-center">起點 {rowLabels.start}</span>
                                            <input type="range" min="0" max={xRange[1]-1} value={xRange[0]} onChange={e=>setXRange([parseInt(e.target.value), xRange[1]])} className="x-slider-compact flex-1 accent-blue-400" />
                                        </div>
                                        <div className="flex items-center gap-4">
                                            <span className="hidden sm:inline text-[14px] font-mono font-bold text-emerald-400 w-24 text-center">終點 {rowLabels.end}</span>
                                            <input type="range" min={xRange[0]+1} max={100} value={xRange[1]} onChange={e=>setXRange([xRange[0], parseInt(e.target.value)])} className="x-slider-compact flex-1 accent-emerald-400" />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div className="pt-8 pb-10 text-center text-slate-600 text-[14px] font-mono uppercase tracking-widest italic opacity-40">
                            Optimized Viewport & Bound-Safe Labels
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
