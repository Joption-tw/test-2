<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能試卷助手</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase SDKs (Compat version to avoid 'require is not defined' in Babel) -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        /**
         * AI 智能試卷助手 - 單檔案 HTML 版本
         * 修復了 require is not defined 與 JSX 渲染錯誤
         */

        // --- 環境變數與配置 ---
        const firebaseConfig = window.__firebase_config ? JSON.parse(window.__firebase_config) : {
            apiKey: "AIzaSyCmqmGIBfUv_UVJU80AB_iUpE_yLLX-dAw",
            authDomain: "mistake-notebook-caca8.firebaseapp.com",
            projectId: "mistake-notebook-caca8",
            storageBucket: "mistake-notebook-caca8.firebasestorage.app",
            messagingSenderId: "298098777699",
            appId: "1:298098777699:web:4590aecebc2293bab9e256"
        };
        const apiKey = ""; // Gemini API Key 由執行環境自動注入
        const appId = window.__app_id || 'mistake-notebook-caca8';

        // 初始化 Firebase
        const firebase = window.firebase;
        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- SVG 圖標組件 (已修復 JSX 相鄰元素問題) ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                camera: (
                    <React.Fragment>
                        <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/>
                        <circle cx="12" cy="13" r="3"/>
                    </React.Fragment>
                ),
                book: <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/>,
                files: (
                    <React.Fragment>
                        <path d="M15.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6.5L15.5 2z"/>
                        <path d="M15 2v5h5"/>
                    </React.Fragment>
                ),
                user: (
                    <React.Fragment>
                        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </React.Fragment>
                ),
                plus: <path d="M12 5v14M5 12h14"/>,
                trash: (
                    <React.Fragment>
                        <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                        <line x1="10" y1="11" x2="10" y2="17"/>
                        <line x1="14" y1="11" x2="14" y2="17"/>
                    </React.Fragment>
                ),
                sparkles: (
                    <React.Fragment>
                        <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
                        <path d="M5 3v4M3 5h4M19 17v4M17 19h4"/>
                    </React.Fragment>
                ),
                zap: <path d="M13 2 L3 14 L12 14 L11 22 L21 10 L12 10 L13 2 Z" />,
                x: <path d="M18 6 6 18M6 6l12 12"/>,
                maximize: <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const { useState, useEffect } = React;

        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('scan');
            const [exams, setExams] = useState([]);
            const [mistakes, setMistakes] = useState([]);
            const [isProcessing, setIsProcessing] = useState(false);
            const [selectedImage, setSelectedImage] = useState(null);
            const [processedResult, setProcessedResult] = useState(null);
            const [processStatus, setProcessStatus] = useState(null);
            const [savedItemIds, setSavedItemIds] = useState(new Set());
            const [previewImage, setPreviewImage] = useState(null);

            // 初始化身份驗證
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (window.__initial_auth_token) {
                            await auth.signInWithCustomToken(window.__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (err) {
                        console.error("Firebase Auth Error:", err);
                    }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged(setUser);
                return () => unsubscribe();
            }, []);

            // 監聽資料庫
            useEffect(() => {
                if (!user) return;
                const path = `artifacts/${appId}/users/${user.uid}`;
                
                const unsubExams = db.collection(`${path}/exams`).onSnapshot(snap => {
                    setExams(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0)));
                });
                
                const unsubMistakes = db.collection(`${path}/mistakes`).onSnapshot(snap => {
                    setMistakes(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0)));
                });
                
                return () => { unsubExams(); unsubMistakes(); };
            }, [user]);

            // 處理圖片選擇
            const handleFile = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = () => {
                        setSelectedImage(reader.result);
                        setProcessedResult(null);
                        setSavedItemIds(new Set());
                    };
                    reader.readAsDataURL(file);
                }
            };

            // 調用 Gemini API 處理影像
            const processImage = async (mode) => {
                if (!selectedImage || !user) return;
                setIsProcessing(true);
                const base64 = selectedImage.split(',')[1];
                
                try {
                    // 清除模式使用 image-preview 模型，錯題模式使用 flash-preview 模型
                    const model = mode === 'clean' ? 'gemini-2.5-flash-image-preview' : 'gemini-2.5-flash-preview-09-2025';
                    const prompt = mode === 'clean' 
                        ? "請移除圖片中所有的手寫筆跡、打勾與紅字批改。保留原始印刷的題目與插圖（如地圖、物理圖形）。輸出還原後的空白掃描試卷圖片。" 
                        : "請辨識圖中的題目。如果題目包含地圖、插圖或幾何圖形，請在辨識結果最後加上 [附圖] 標籤。請將題目分割，並回傳一個包含 'questions' 陣列的 JSON 物件，每個元素有 'content' (文字內容) 和 'index' (編號)。";

                    const payload = {
                        contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: base64 } }] }],
                        generationConfig: mode === 'clean' ? { responseModalities: ["IMAGE"] } : { responseMimeType: "application/json" }
                    };

                    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                    
                    if (!resp.ok) throw new Error(`API 錯誤: ${resp.status}`);
                    const res = await resp.json();
                    
                    if (!res.candidates || res.candidates.length === 0) throw new Error("AI 未能生成結果");

                    if (mode === 'clean') {
                        const imgData = res.candidates[0].content.parts.find(p => p.inlineData)?.inlineData.data;
                        if (!imgData) throw new Error("未獲取到影像數據");
                        setProcessedResult({ type: 'exam', url: `data:image/jpeg;base64,${imgData}` });
                    } else {
                        const text = res.candidates[0].content.parts[0].text;
                        const json = JSON.parse(text.replace(/```json/g, '').replace(/```/g, '').trim());
                        setProcessedResult({ type: 'mistake', items: json.questions, url: selectedImage });
                    }
                    setProcessStatus({ success: true, message: "智能分析完成" });
                } catch (e) { 
                    console.error("AI 處理出錯:", e);
                    setProcessStatus({ success: false, message: "分析失敗，請檢查圖片清晰度" }); 
                } finally {
                    setIsProcessing(false);
                }
            };

            // 儲存單個錯題 (包含原圖以保留插圖資訊)
            const saveMistake = async (content, idx) => {
                if (!user) return;
                try {
                    await db.collection(`artifacts/${appId}/users/${user.uid}/mistakes`).add({
                        imageUrl: processedResult.url,
                        content: content,
                        createdAt: Date.now(),
                        itemIndex: idx
                    });
                    setSavedItemIds(prev => new Set(prev).add(idx));
                    setProcessStatus({ success: true, message: "已加入錯題本" });
                    setTimeout(() => setProcessStatus(null), 2000);
                } catch (err) {
                    setProcessStatus({ success: false, message: "儲存失敗" });
                }
            };

            // 儲存空白試卷
            const saveCleanPaper = async () => {
                if (!processedResult || processedResult.type !== 'exam' || !user) return;
                try {
                    await db.collection(`artifacts/${appId}/users/${user.uid}/exams`).add({
                        imageUrl: processedResult.url,
                        createdAt: Date.now(),
                        title: `空白卷_${new Date().toLocaleTimeString()}`
                    });
                    setProcessStatus({ success: true, message: "試卷已儲存" });
                    setTimeout(() => {
                        setSelectedImage(null);
                        setProcessedResult(null);
                        setActiveTab('exams');
                    }, 1000);
                } catch (err) {
                    setProcessStatus({ success: false, message: "儲存失敗" });
                }
            };

            const deleteItem = async (col, id) => {
                if (!user) return;
                await db.doc(`artifacts/${appId}/users/${user.uid}/${col}/${id}`).delete();
            };

            const NavItem = ({ id, icon, label }) => (
                <button onClick={() => setActiveTab(id)} className={`flex flex-col items-center flex-1 py-2 transition-all ${activeTab === id ? 'text-indigo-600' : 'text-slate-400'}`}>
                    {icon()}
                    <span className="text-[10px] mt-1 font-bold">{label}</span>
                </button>
            );

            return (
                <div className="flex flex-col h-screen max-w-md mx-auto bg-slate-50 border-x shadow-2xl relative overflow-hidden">
                    {/* Header */}
                    <header className="bg-white p-4 border-b border-slate-100 flex items-center justify-between sticky top-0 z-20 shadow-sm">
                        <div className="flex items-center gap-2">
                            <Icon name="zap" className="text-indigo-600 fill-current" size={20} />
                            <h1 className="font-black text-slate-800 tracking-tight">智能試卷助手</h1>
                        </div>
                    </header>

                    {/* Main Content Area */}
                    <main className="flex-1 overflow-y-auto pb-24 p-4">
                        {activeTab === 'scan' && (
                            <div className="space-y-6 animate-in fade-in">
                                {!selectedImage ? (
                                    <div className="bg-white rounded-[2.5rem] p-10 border border-slate-100 flex flex-col items-center space-y-4 shadow-sm">
                                        <label className="bg-indigo-600 p-6 rounded-full text-white cursor-pointer hover:scale-105 transition-transform shadow-lg shadow-indigo-100">
                                            <Icon name="camera" size={44} />
                                            <input type="file" accept="image/*" capture="environment" className="hidden" onChange={handleFile} />
                                        </label>
                                        <p className="font-bold text-slate-600">拍攝試卷、筆記或地圖</p>
                                        <p className="text-[10px] text-slate-400">AI 將協助您分割題目或還原空白卷</p>
                                    </div>
                                ) : (
                                    <div className="space-y-4">
                                        {/* 影像預覽 */}
                                        <div className="relative rounded-3xl overflow-hidden border-4 border-white shadow-xl bg-slate-900 aspect-[3/4] flex items-center justify-center">
                                            <img src={processedResult?.url || selectedImage} className="max-h-full object-contain" />
                                            <button onClick={() => { setSelectedImage(null); setProcessedResult(null); }} className="absolute top-4 right-4 bg-black/40 p-2 rounded-full text-white backdrop-blur-md">
                                                <Icon name="x" size={20}/>
                                            </button>
                                        </div>

                                        {/* 分割題目列表 (核心功能) */}
                                        {processedResult?.type === 'mistake' && (
                                            <div className="space-y-3 animate-in slide-in-from-bottom-4">
                                                <div className="flex items-center justify-between px-1">
                                                    <h3 className="text-xs font-black text-slate-500 flex items-center gap-2">
                                                        <Icon name="sparkles" size={14} className="text-indigo-500"/> 分割題目結果
                                                    </h3>
                                                    <span className="text-[10px] bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded-full font-bold">共 {processedResult.items.length} 題</span>
                                                </div>
                                                {processedResult.items.map(q => (
                                                    <div key={q.index} className="bg-white p-4 rounded-2xl border border-slate-200 flex flex-col gap-3 shadow-sm hover:border-indigo-200 transition-colors">
                                                        <p className="text-sm font-semibold text-slate-700 leading-relaxed whitespace-pre-wrap">{q.content}</p>
                                                        <div className="flex justify-end">
                                                            {savedItemIds.has(q.index) ? (
                                                                <span className="text-emerald-600 text-[10px] font-black px-4 py-2 bg-emerald-50 rounded-xl border border-emerald-100 flex items-center gap-1.5 animate-in zoom-in">
                                                                    <Icon name="zap" size={12} className="fill-current"/> 已加入錯題本
                                                                </span>
                                                            ) : (
                                                                <button onClick={() => saveMistake(q.content, q.index)} className="bg-indigo-600 text-white text-[10px] font-black px-5 py-2 rounded-xl shadow-md active:scale-95 transition-all">加入錯題本</button>
                                                            )}
                                                        </div>
                                                    </div>
                                                ))}
                                                <div className="pt-4 text-center">
                                                    <button onClick={() => { setSelectedImage(null); setProcessedResult(null); }} className="text-slate-400 text-[10px] font-bold uppercase tracking-wider">完成辨識，重新拍攝</button>
                                                </div>
                                            </div>
                                        )}

                                        {/* 操作按鈕 */}
                                        {!processedResult && (
                                            <div className="grid grid-cols-2 gap-4">
                                                <button onClick={() => processImage('clean')} className="bg-indigo-600 text-white p-5 rounded-[2rem] font-bold flex flex-col items-center gap-2 shadow-lg shadow-indigo-100 active:scale-95 transition-transform">
                                                    <Icon name="sparkles" /> <span>清除筆跡</span>
                                                </button>
                                                <button onClick={() => processImage('mistake')} className="bg-slate-800 text-white p-5 rounded-[2rem] font-bold flex flex-col items-center gap-2 shadow-lg shadow-slate-200 active:scale-95 transition-transform">
                                                    <Icon name="files" /> <span>分割題目</span>
                                                </button>
                                            </div>
                                        )}

                                        {processedResult?.type === 'exam' && (
                                            <div className="grid grid-cols-2 gap-4">
                                                <button onClick={() => { setSelectedImage(null); setProcessedResult(null); }} className="bg-slate-100 text-slate-600 p-5 rounded-2xl font-bold active:scale-95 transition-all">重拍</button>
                                                <button onClick={saveCleanPaper} className="bg-emerald-600 text-white p-5 rounded-2xl font-bold shadow-xl shadow-emerald-100 active:scale-95 transition-all">儲存空白卷</button>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'book' && (
                            <div className="space-y-4 animate-in fade-in">
                                <h2 className="text-xl font-black text-slate-800">圖文錯題本 ({mistakes.length})</h2>
                                {mistakes.map(m => (
                                    <div key={m.id} className="bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm hover:shadow-md transition-shadow">
                                        <div className="h-44 bg-slate-100 relative group overflow-hidden">
                                            <img src={m.imageUrl} className="w-full h-full object-cover opacity-90 group-hover:opacity-100 transition-opacity" alt="題目圖形"/>
                                            <button onClick={() => setPreviewImage(m.imageUrl)} className="absolute bottom-3 right-3 p-2.5 bg-white/80 backdrop-blur-md rounded-full text-indigo-600 shadow-lg active:scale-90"><Icon name="maximize" size={18}/></button>
                                        </div>
                                        <div className="p-5 relative">
                                            <button onClick={() => deleteItem('mistakes', m.id)} className="absolute top-5 right-5 text-slate-300 hover:text-rose-500 transition-colors"><Icon name="trash" size={18}/></button>
                                            <div className="flex items-center gap-2 mb-2">
                                                <span className="text-[10px] font-black text-indigo-500 bg-indigo-50 px-2.5 py-1 rounded-md">附圖題目</span>
                                                <span className="text-[10px] text-slate-300 font-bold">{new Date(m.createdAt).toLocaleDateString()}</span>
                                            </div>
                                            <p className="text-sm font-medium text-slate-700 leading-relaxed whitespace-pre-wrap">{m.content}</p>
                                        </div>
                                    </div>
                                ))}
                                {mistakes.length === 0 && (
                                    <div className="py-20 text-center flex flex-col items-center opacity-20">
                                        <Icon name="book" size={64} className="mb-4" />
                                        <p className="font-bold">目前沒有錯題資料</p>
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'exams' && (
                            <div className="space-y-4 animate-in fade-in">
                                <h2 className="text-xl font-black text-slate-800">空白試卷庫</h2>
                                <div className="grid grid-cols-2 gap-4">
                                    {exams.map(e => (
                                        <div key={e.id} className="bg-white rounded-2xl border border-slate-200 overflow-hidden relative group shadow-sm">
                                            <img src={e.imageUrl} className="aspect-[3/4] object-cover" />
                                            <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                                <button onClick={() => deleteItem('exams', e.id)} className="p-3 bg-rose-500 text-white rounded-xl shadow-xl active:scale-90 transition-transform"><Icon name="trash" size={20}/></button>
                                            </div>
                                        </div>
                                    ))}
                                    {exams.length === 0 && (
                                        <div className="col-span-2 py-20 text-center text-slate-300">
                                            <Icon name="files" size={48} className="mx-auto mb-2 opacity-20" />
                                            <p className="text-sm font-bold">尚未儲存空白試卷</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {activeTab === 'profile' && (
                            <div className="py-20 text-center space-y-6 animate-in fade-in">
                                <div className="w-24 h-24 bg-gradient-to-br from-indigo-500 to-blue-700 rounded-[2.5rem] mx-auto flex items-center justify-center text-white shadow-2xl shadow-indigo-100 border-4 border-white"><Icon name="user" size={48} /></div>
                                <div>
                                    <h3 className="text-2xl font-black text-slate-800 tracking-tight">雲端同步帳號</h3>
                                    <p className="text-[10px] text-slate-400 mt-2 font-mono bg-white p-3 rounded-2xl border border-slate-100 mx-8 shadow-inner overflow-hidden text-ellipsis whitespace-nowrap">{user?.uid}</p>
                                </div>
                                <div className="bg-emerald-50 text-emerald-600 px-6 py-2 rounded-full inline-flex items-center gap-2 text-xs font-bold border border-emerald-100">
                                    <Icon name="zap" size={14} className="fill-current" /> 已啟用雲端存儲
                                </div>
                            </div>
                        )}
                    </main>

                    {/* 大圖預覽 */}
                    {previewImage && (
                        <div className="fixed inset-0 z-[100] bg-black/95 backdrop-blur-md flex items-center justify-center p-6 animate-in fade-in duration-300" onClick={() => setPreviewImage(null)}>
                            <button className="absolute top-10 right-6 text-white p-3 hover:bg-white/10 rounded-full transition-colors"><Icon name="x" size={32}/></button>
                            <img src={previewImage} className="max-w-full max-h-full object-contain rounded-xl shadow-2xl" />
                        </div>
                    )}

                    {/* 處理中介面 */}
                    {isProcessing && (
                        <div className="absolute inset-0 bg-white/95 z-50 flex flex-col items-center justify-center p-10 text-center animate-in fade-in">
                            <div className="relative mb-8">
                                <div className="w-20 h-20 border-4 border-indigo-100 rounded-full"></div>
                                <div className="w-20 h-20 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin absolute top-0 left-0"></div>
                            </div>
                            <h3 className="text-2xl font-black text-slate-800 tracking-tight">AI 智能分析中</h3>
                            <p className="mt-4 text-sm text-slate-400 leading-relaxed max-w-[240px]">正在利用最新 Flash 引擎分析試卷結構、地圖與插圖...</p>
                        </div>
                    )}

                    {/* 通知 */}
                    {processStatus && (
                        <div className={`fixed top-20 left-1/2 -translate-x-1/2 z-[100] px-6 py-3.5 rounded-2xl shadow-2xl text-white text-[10px] font-black flex items-center gap-3 animate-in slide-in-from-top-12 border-b-4 ${processStatus.success ? 'bg-emerald-500 border-emerald-700' : 'bg-rose-500 border-rose-700'}`}>
                            <Icon name="zap" size={14} className="fill-current"/>
                            {processStatus.message}
                        </div>
                    )}

                    {/* Footer Nav */}
                    <nav className="bg-white/95 backdrop-blur-xl border-t border-slate-100 flex justify-around items-center h-20 sticky bottom-0 z-30 shadow-[0_-8px_30px_rgba(0,0,0,0.03)]">
                        <NavItem id="scan" icon={() => <Icon name="camera" size={activeTab === 'scan' ? 26 : 24}/>} label="拍照" />
                        <NavItem id="exams" icon={() => <Icon name="files" size={activeTab === 'exams' ? 26 : 24}/>} label="試卷" />
                        <div className="relative -top-8 px-4">
                            <label className="bg-indigo-600 text-white w-16 h-16 rounded-[1.75rem] flex items-center justify-center shadow-2xl shadow-indigo-300 border-4 border-white active:scale-90 hover:bg-indigo-700 transition-all cursor-pointer">
                                <Icon name="plus" size={32} />
                                <input type="file" className="hidden" onChange={handleFile} />
                            </label>
                        </div>
                        <NavItem id="book" icon={() => <Icon name="book" size={activeTab === 'book' ? 26 : 24}/>} label="錯題" />
                        <NavItem id="profile" icon={() => <Icon name="user" size={activeTab === 'profile' ? 26 : 24}/>} label="我的" />
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
